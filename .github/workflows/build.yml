name: Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: build
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      actions: write
      packages: write
      contents: read
    steps:
      -
        name: Get latest version
        run: |
          #!/usr/bin/env bash
          set -Eeuo pipefail

          url="https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/latest-virtio/"
          resp=$(curl -fsS "$url")

          latest_tag=$(
            grep -o 'href="[^"]*' <<< "$resp" |
              sed -n 's|^.*virtio-win-\([^/"]*\)/.*|\1|p' |
              head -n 1
          )

          if [ -z "$latest_tag" ]; then
            echo "ERROR: Tag not found." >&2
            exit 1
          fi

          base=${latest_tag%%-*}

          echo "Found tag: \"$latest_tag\""

          {
            echo "latest_tag=$latest_tag"
            echo "latest_base=$base"
          } >> "$GITHUB_ENV"
      -
        name: Check if the tag exists locally
        uses: action-pack/tag-exists@v1
        id: checkTag
        with:
          tag: 'v${{ env.latest_tag }}'
      -
        name: Finish when found
        run: |
          #!/usr/bin/env bash
          set -Eeuo pipefail

          if [ "${{ steps.checkTag.outputs.exists }}" = "true" ]; then
            echo "exists=true" >> "$GITHUB_ENV"
            exit 0
          fi

          url="https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/archive-virtio/virtio-win-${{ env.latest_tag }}/"

          echo "Checking if $url exists..."

          if ! curl -fsSI "$url" >/dev/null; then
            echo "ERROR: Download location not found: $url" >&2
            exit 1
          fi

          echo "exists=false" >> "$GITHUB_ENV"
      -
        name: Download Fedora drivers
        if: env.exists == 'false'
        id: fedora
        run: |
          #!/usr/bin/env bash
          set -Eeuo pipefail

          sudo apt-get update
          sudo apt-get install -y rdfind genisoimage libarchive-tools

          url="https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/archive-virtio/virtio-win-${{ env.latest_tag }}/virtio-win-${{ env.latest_base }}.iso"

          echo "Downloading $url"

          wget "$url" -O /tmp/latest.iso -q

          rm -rf /tmp/iso
          mkdir -p /tmp/iso

          bsdtar -xf /tmp/latest.iso -C /tmp/iso
      -
        name: Strip unnecessary bloat
        if: env.exists == 'false'
        id: strip
        run: |
          #!/usr/bin/env bash
          set -Eeuo pipefail

          # Remove bloat.
          sudo rm -f /tmp/iso/winfsp-*
          sudo rm -rf \
            /tmp/iso/spice-vdagent \
            /tmp/iso/qxl-wddm-dod \
            /tmp/iso/qxl \
            /tmp/iso/qxldod

          # Remove tools for other platforms.
          sudo rm -rf \
            /tmp/iso/i386 \
            /tmp/iso/tools \
            /tmp/iso/guest-agent

          sudo rm -f \
            /tmp/iso/virtio-win-gt-x86.msi \
            /tmp/iso/virtio-win-guest-tools.exe

          # Remove test and bridge utilities.
          if [ -d /tmp/iso/viosock ]; then
            sudo find /tmp/iso/viosock \
              -type f \
              \( \
                -iname 'viosock-test.exe' -o \
                -iname 'viosocklib-test.exe' -o \
                -iname 'vstbridge.exe' \
              \) \
              -delete
          fi

          # Remove debug symbols.
          sudo find /tmp/iso -type f -iname '*.pdb' -delete

          # Remove drivers for other architectures.
          sudo find /tmp/iso \
            -type d \
            \( -iname x86 -o -iname arm64 \) \
            -prune \
            -exec rm -rf {} +

          # Replace any symlinks with normal files or directories.
          sudo bash -Eeuo pipefail <<'EOF'
          while IFS= read -r -d '' link; do
            target=$(readlink -f -- "$link")

            if [ -z "$target" ] || [ ! -e "$target" ]; then
              echo "ERROR: Broken symlink in ISO: $link" >&2
              exit 1
            fi

            case "$target" in
              /tmp/iso/*) ;;
              *)
                echo "ERROR: Symlink points outside the ISO tree: $link -> $target" >&2
                exit 1
                ;;
            esac

            replacement="${link}.resolved"
            rm -rf -- "$replacement"

            if [ -d "$target" ]; then
              cp -aL -- "$target" "$replacement"
            else
              cp -L --preserve=mode,timestamps -- "$link" "$replacement"
            fi

            rm -rf -- "$link"
            mv -- "$replacement" "$link"
          done < <(find /tmp/iso -type l -print0)

          find /tmp/iso -depth -type d -empty -delete
          EOF
      -
        name: Deduplicate files
        if: env.exists == 'false'
        id: deduplicate
        run: |
          #!/usr/bin/env bash
          set -Eeuo pipefail

          sudo rdfind \
            -outputname /dev/null \
            -removeidentinode false \
            -makehardlinks true \
            /tmp/iso
      -
        name: Build minified ISO
        if: env.exists == 'false'
        id: build
        run: |
          #!/usr/bin/env bash
          set -Eeuo pipefail

          base="${{ env.latest_base }}"
          owner="$(id -u):$(id -g)"

          sudo genisoimage \
            -o "/tmp/virtio-win-${base}.iso" \
            -r \
            -iso-level 4 \
            -input-charset iso8859-1 \
            -cache-inodes \
            -V "virtio-win-${base}" \
            /tmp/iso

          # Keep the MSI files in the ISO, but omit them from the archives.
          sudo rm -f /tmp/iso/*.msi

          sudo tar \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            -C /tmp/iso \
            -czf "/tmp/virtio-win-${base}.tar.gz" \
            .

          sudo env XZ_OPT=-9 tar \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            -C /tmp/iso \
            -cJf "/tmp/virtio-win-${base}.tar.xz" \
            .

          sudo chown "$owner" \
            "/tmp/virtio-win-${base}.iso" \
            "/tmp/virtio-win-${base}.tar.gz" \
            "/tmp/virtio-win-${base}.tar.xz"
      -
        name: Checkout
        if: env.exists == 'false'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      -
        name: Create a release
        if: env.exists == 'false'
        uses: action-pack/github-release@v2
        with:
          body: " "
          tag: "v${{ env.latest_tag }}"
          title: "v${{ env.latest_base }}"
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
      -
        name: Update release
        if: env.exists == 'false'
        uses: AButler/upload-release-assets@v4.0
        with:
          files: '/tmp/virtio-win-${{ env.latest_base }}.*'
          release-tag: "v${{ env.latest_tag }}"
          repo-token: ${{ secrets.REPO_ACCESS_TOKEN }}
      -
        name: Send mail
        if: env.exists == 'false'
        uses: action-pack/send-mail@v1
        with:
          to: ${{ secrets.MAILTO }}
          from: Github Actions <${{ secrets.MAILTO }}>
          connection_url: ${{ secrets.MAIL_CONNECTION }}
          subject: Build of ${{ github.event.repository.name }} v${{ env.latest_tag }} completed
          body: |
            The build job of ${{ github.event.repository.name }} v${{ env.latest_tag }} was completed successfully!

            See https://github.com/${{ github.repository }}/actions for more information.
